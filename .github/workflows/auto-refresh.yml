name: Auto Refresh Static Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Fetch market data
        run: python3 scripts/fetch_data.py
      - name: Commit & push
        run: |
          git config user.name "warroom-bot"
          git config user.email "bot@warroom.local"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "📊 auto refresh [skip ci]"
            git push
          fi
